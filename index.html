<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="星星官网 - 专业、创新的服务体验">
    <title>星星官网</title>
    <style>
        :root {
            --text-dark: #1d1d1f;
            --text-gray: #6e6e73;
            --text-light: #666;
            --border-light: #d2d2d6;
            --bg-gray: #f5f5f7;
            --nav-bg: #ffffff;
            --white: #fff;
            --footer-bg: #f5f5f7;
            --notification-bg: rgba(0, 0, 0, 0.8);
            --transition-speed: 0.3s;
            --greeting-size: 4rem;
            --welcome-size: 2.2rem;
            --nav-link-size: 1.1rem;
            --notification-size: 1.35rem;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html {
            scroll-behavior: smooth;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: var(--bg-gray);
        }
        
        .globalnav {
            height: 44px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            border-bottom: 1px solid var(--border-light);
            background-color: var(--nav-bg);
        }
        
        .globalnav-logo {
            height: 44px;
            display: flex;
            align-items: center;
        }
        
        .nav-logo {
            height: 44px;
            width: auto;
            display: block;
        }
        
        .globalnav-links {
            display: flex;
            gap: 25px;
            height: 44px;
            align-items: center;
        }
        
        .globalnav-link {
            text-decoration: none;
            color: var(--text-gray);
            font-size: var(--nav-link-size);
            transition: color var(--transition-speed);
            padding: 0;
            cursor: pointer;
            border-radius: 4px;
            line-height: 44px;
            display: inline-block;
        }
        
        .globalnav-link:hover {
            color: var(--text-dark);
        }
        
        .globalnav-link:focus-visible {
            outline: 2px solid var(--text-dark);
            outline-offset: 2px;
        }
        
        .notification {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: var(--notification-bg);
            color: var(--white);
            padding: 15px 25px;
            border-radius: 8px;
            font-size: var(--notification-size);
            z-index: 1000;
            opacity: 0;
            transition: opacity var(--transition-speed);
            pointer-events: none;
            white-space: nowrap;
            font-weight: 500;
        }
        
        .notification.show {
            opacity: 1;
        }
        
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            text-align: center;
            min-height: calc(100vh - 44px);
        }
        
        .center-logo {
            max-width: 500px;
            width: 100%;
            height: auto;
            margin-bottom: 40px;
            animation: subtle-float 2s ease-in-out infinite;
            will-change: transform;
        }
        
        .greeting {
            font-size: var(--greeting-size);
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text-dark);
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .greeting span {
            opacity: 0;
            animation: fadeIn 0.8s ease forwards;
        }
        
        .welcome-text {
            font-size: var(--welcome-size);
            color: var(--text-gray);
            line-height: 1.6;
            font-weight: 400;
        }

        .footer {
            background-color: var(--footer-bg);
            padding: 40px 30px 25px;
            border-top: 1px solid var(--border-light);
        }
        
        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 40px;
        }
        
        .footer-section {
            flex: 1;
            min-width: 150px;
        }
        
        .footer-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .footer-links {
            list-style: none;
        }
        
        .footer-links li {
            margin-bottom: 10px;
        }
        
        .footer-links a {
            text-decoration: none;
            color: var(--text-gray);
            font-size: 0.85rem;
            transition: color var(--transition-speed);
            display: inline-block;
            cursor: pointer;
        }
        
        .footer-links a:hover {
            color: var(--text-dark);
            text-decoration: underline;
            text-underline-offset: 4px;
        }
        
        .footer-social {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }
        
        .footer-social a {
            text-decoration: none;
            color: var(--text-gray);
            font-size: 1rem;
            transition: color var(--transition-speed);
        }
        
        .footer-social a:hover {
            color: var(--text-dark);
            text-decoration: underline;
            text-underline-offset: 4px;
        }
        
        .footer-bottom {
            max-width: 1200px;
            margin: 30px auto 0;
            padding-top: 20px;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-gray);
        }
        
        .footer-bottom p {
            margin-bottom: 8px;
        }
        
        .footer-bottom a {
            color: var(--text-gray);
            text-decoration: none;
        }
        
        .footer-bottom a:hover {
            color: var(--text-dark);
            text-decoration: underline;
            text-underline-offset: 4px;
        }
        
        .thanks {
            font-size: 0.7rem;
            color: var(--text-gray);
            margin-top: 10px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes subtle-float {
            0% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-12px);
            }
            100% {
                transform: translateY(0px);
            }
        }
        
        @media (max-width: 734px) {
            .globalnav {
                height: 48px;
                padding: 0 20px;
            }
            
            .globalnav-logo {
                height: 48px;
            }
            
            .nav-logo {
                height: 48px;
            }
            
            .globalnav-links {
                height: 48px;
                gap: 18px;
            }
            
            .globalnav-link {
                font-size: 1rem;
                line-height: 48px;
            }
            
            .center-logo {
                max-width: 300px;
            }
            
            .greeting {
                font-size: 2.8rem;
                min-height: 65px;
            }
            
            .welcome-text {
                font-size: 1.7rem;
            }
            
            .notification {
                font-size: 1.2rem;
                padding: 12px 20px;
            }
            
            .main-content {
                min-height: calc(100vh - 48px);
            }
            
            .footer {
                padding: 30px 20px 20px;
            }
            
            .footer-content {
                flex-direction: column;
                gap: 25px;
            }
            
            .footer-section {
                text-align: center;
            }
            
            .footer-social {
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .globalnav {
                height: 48px;
                padding: 0 15px;
            }
            
            .globalnav-links {
                gap: 14px;
            }
            
            .globalnav-link {
                font-size: 0.95rem;
                line-height: 48px;
            }
            
            .center-logo {
                max-width: 250px;
            }
            
            .greeting {
                font-size: 2.2rem;
                min-height: 55px;
            }
            
            .welcome-text {
                font-size: 1.3rem;
            }
            
            .notification {
                font-size: 1rem;
                padding: 10px 18px;
                white-space: normal;
                text-align: center;
                min-width: 200px;
            }
            
            .main-content {
                min-height: calc(100vh - 48px);
            }
            
            .footer {
                padding: 25px 15px 15px;
            }
        }
    </style>
</head>
<body>
    <nav class="globalnav">
        <div class="globalnav-logo">
            <img src="photo/logo.png" alt="星星官网标志" class="nav-logo" loading="lazy">
        </div>
        <div class="globalnav-links">
            <a href="#" class="globalnav-link" id="home-link" aria-label="首页">首页</a>
            <a href="#" class="globalnav-link" id="about-link" aria-label="关于我们">关于我们</a>
            <a href="#" class="globalnav-link" id="service-link" aria-label="服务">服务</a>
            <a href="#" class="globalnav-link" id="contact-link" aria-label="联系我们">联系我们</a>
        </div>
    </nav>
    
    <div class="notification" id="notification" aria-live="polite">敬请期待</div>
    
    <main class="main-content">
        <img src="photo/logo.png" alt="星星官网中心标志" class="center-logo" loading="lazy">
        
        <div class="greeting" id="greeting" aria-label="动态问候语">
            <!-- 问候语动态插入 -->
        </div>
        
        <p class="welcome-text">欢迎回来</p>
    </main>
    
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-section">
                <h3 class="footer-title">探索</h3>
                <ul class="footer-links">
                    <li><a href="#" class="footer-link" id="footer-home-link">首页</a></li>
                    <li><a href="#" class="footer-link" id="footer-about-link">关于我们</a></li>
                    <li><a href="#" class="footer-link" id="footer-service-link">服务</a></li>
                    <li><a href="#" class="footer-link" id="footer-contact-link">联系我们</a></li>
                </ul>
            </div>
            
            <div class="footer-section">
                <h3 class="footer-title">关注我们</h3>
                <div class="footer-social">
                    <a href="#" id="douyin-link" target="_blank" rel="noopener noreferrer" aria-label="抖音">抖音</a>
                    <a href="#" id="github-link" target="_blank" rel="noopener noreferrer" aria-label="GitHub">GitHub</a>
                </div>
            </div>
        </div>
        
        <div class="footer-bottom">
            <p>&copy; 2026 星星官网. 保留所有权利。</p>
            <div class=" ">
            </div>
        </div>
    </footer>

    <script>
        (function() {
            const greetings = [
                "你好",
                "Hello", 
                "Hola",
                "Bonjour",
                "Hallo",
                "Ciao",
                "こんにちは",
                "안녕하세요",
                "Привет",
                "مرحبا"
            ];
            
            let currentGreetingIndex = 0;
            const greetingElement = document.getElementById('greeting');
            const notification = document.getElementById('notification');

            function updateGreeting() {
                if (!greetingElement) return;
                
                const newSpan = document.createElement('span');
                newSpan.textContent = greetings[currentGreetingIndex];
                newSpan.style.animation = 'none';
                
                greetingElement.innerHTML = '';
                greetingElement.appendChild(newSpan);
                

                setTimeout(() => {
                    newSpan.style.animation = '';
                }, 10);
                
                currentGreetingIndex = (currentGreetingIndex + 1) % greetings.length;
            }
            
            function showNotification() {
                if (!notification) return;
                
                notification.classList.add('show');
                
                setTimeout(() => {
                    notification.classList.remove('show');
                }, 1500);
            }
            
            function scrollToTop() {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
            
            function scrollToFooter() {
                const footer = document.querySelector('.footer');
                if (footer) {
                    footer.scrollIntoView({ behavior: 'smooth' });
                }
            }
           
            function goToService() {
                window.location.href = './serve/index.html';
            }
            
            const douyinUrl = 'https://www.douyin.com/user/MS4wLjABAAAASkP1rl3lePnPAJcRz-M6INTL8-ZDWvJEXXUiWe1KAlXclwL1qcGjjyotx4NvjLCf?from_tab_name=main';
            
            const githubUrl = 'https://github.com/wbzmm2025/star.github.io';

            const homeLink = document.getElementById('home-link');
            const aboutLink = document.getElementById('about-link');
            const serviceLink = document.getElementById('service-link');
            const contactLink = document.getElementById('contact-link');
            
            const footerHomeLink = document.getElementById('footer-home-link');
            const footerAboutLink = document.getElementById('footer-about-link');
            const footerServiceLink = document.getElementById('footer-service-link');
            const footerContactLink = document.getElementById('footer-contact-link');
            
            const douyinLink = document.getElementById('douyin-link');
            const githubLink = document.getElementById('github-link');
            
            if (homeLink) {
                homeLink.addEventListener('click', (e) => {
                    e.preventDefault();
                    scrollToTop();
                });
            }
            
            if (footerHomeLink) {
                footerHomeLink.addEventListener('click', (e) => {
                    e.preventDefault();
                    scrollToTop();
                });
            }
            
            if (aboutLink) {
                aboutLink.addEventListener('click', (e) => {
                    e.preventDefault();
                    scrollToFooter();
                });
            }
            
            if (footerAboutLink) {
                footerAboutLink.addEventListener('click', (e) => {
                    e.preventDefault();
                    scrollToFooter();
                });
            }
            
 
            if (serviceLink) {
                serviceLink.addEventListener('click', (e) => {
                    e.preventDefault();
                    goToService();
                });
            }
            
            if (footerServiceLink) {
                footerServiceLink.addEventListener('click', (e) => {
                    e.preventDefault();
                    goToService();
                });
            }
           
            if (contactLink) {
                contactLink.addEventListener('click', (e) => {
                    e.preventDefault();
                    scrollToFooter();
                });
            }
            
            if (footerContactLink) {
                footerContactLink.addEventListener('click', (e) => {
                    e.preventDefault();
                    scrollToFooter();
                });
            }

            if (douyinLink) {
                douyinLink.addEventListener('click', (e) => {
                    e.preventDefault();
                    window.open(douyinUrl, '_blank');
                });
            }

            if (githubLink) {
                githubLink.addEventListener('click', (e) => {
                    e.preventDefault();
                    window.open(githubUrl, '_blank');
                });
            }

            updateGreeting();
            setInterval(updateGreeting, 3000);
        })();
    </script>
</body>
</html>
